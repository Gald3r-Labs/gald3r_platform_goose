# REFERENCE ONLY — global Goose config snippet for gald3r MCP.
# Docs: https://block.github.io/goose/docs/guides/config-file/
#
# IMPORTANT: Goose has NO project-level `.goose/config.yaml` convention.
# Goose config lives GLOBALLY at `~/.config/goose/config.yaml` and is normally
# managed interactively via `goose configure`. This file is a copy-paste
# reference for the gald3r MCP extension block — do NOT expect Goose to read
# this file from the project. See PLATFORM_SPEC.md (this folder) section 8.
#
# In Goose, extensions ARE MCP servers. To let Goose drive gald3r task / bug /
# vault operations, add an extension to your GLOBAL ~/.config/goose/config.yaml
# (or run `goose configure` -> Add Extension). Adjust the URL once the gald3r
# MCP backend is running (adv tier):
#
# extensions:
#   - name: gald3r-mcp
#     type: sse          # or stdio; match your gald3r MCP backend
#     uri: http://localhost:8092/mcp
#     enabled: true
